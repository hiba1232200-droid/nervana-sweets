# ─── NERVANA SWEETS · local production stack (app + PostgreSQL) ───
# Usage:
#   cp .env.example .env   (adjust secrets)
#   docker compose up --build
#   docker compose exec app npx prisma migrate deploy && docker compose exec app npm run db:seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nervana
      POSTGRES_PASSWORD: nervana
      POSTGRES_DB: nervana
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatic daily backups (see scripts/backup.sh) mount:
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nervana"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://nervana:nervana@db:5432/nervana?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "change-me-in-production"
      JWT_SECRET: "change-me-too-in-production"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    ports:
      - "3000:3000"

volumes:
  pgdata:
